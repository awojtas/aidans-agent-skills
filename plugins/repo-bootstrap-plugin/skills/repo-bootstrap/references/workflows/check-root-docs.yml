name: Check Root Documentation Files

on:
  pull_request:
    paths:
      - '*.md'
      - '*.MD'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for disallowed markdown files in root
        id: check
        run: |
          changed_md_files=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD | grep '^[^/]*\.md$' || true)

          allowed_files=("README.md" "CLAUDE.md" "AGENTS.md")
          disallowed_files=()

          for file in $changed_md_files; do
            filename=$(basename "$file")
            filename_lower=$(echo "$filename" | tr '[:upper:]' '[:lower:]')

            is_allowed=false
            for allowed in "${allowed_files[@]}"; do
              allowed_lower=$(echo "$allowed" | tr '[:upper:]' '[:lower:]')
              if [ "$filename_lower" = "$allowed_lower" ]; then
                is_allowed=true
                break
              fi
            done

            if [ "$is_allowed" = false ]; then
              disallowed_files+=("$filename")
            fi
          done

          if [ ${#disallowed_files[@]} -gt 0 ]; then
            echo "found_issues=true" >> $GITHUB_OUTPUT
            echo "files=${disallowed_files[*]}" >> $GITHUB_OUTPUT
            echo "::warning::Found markdown files in root that should be in /docs: ${disallowed_files[*]}"
          else
            echo "found_issues=false" >> $GITHUB_OUTPUT
            echo "No disallowed markdown files found in root"
          fi

      - name: Post PR comment if issues found
        if: steps.check.outputs.found_issues == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const files = '${{ steps.check.outputs.files }}'.split(' ');
            const fileList = files.map(f => `- \`${f}\``).join('\n');

            const comment = `## Documentation File Location Issue

            The following markdown files were added to the root directory but should be in the \`/docs\` folder:

            ${fileList}

            **Allowed files in root:**
            - \`README.md\`
            - \`CLAUDE.md\`
            - \`AGENTS.md\`

            **Please move these files to the \`/docs\` folder** to keep the repository root clean.

            You can do this with:
            \`\`\`bash
            ${files.map(f => `git mv ${f} docs/`).join('\n')}
            git commit -m "Move documentation to docs folder"
            git push
            \`\`\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Documentation File Location Issue')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
