name: GitGuardian Security Scan

# Run on pushes and pull requests to detect committed secrets and credentials.
# workflow_dispatch lets the human admin trigger one run after repo setup so
# the "Require status checks" picker in branch-protection rulesets becomes
# populated without waiting for an organic PR.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'
      - 'preview/**'
  pull_request:
    branches:
      - main
      - 'release/**'

jobs:
  scanning:
    name: GitGuardian Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield/actions/secret@v1.48.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
